<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimpleBill</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#2563eb',
              secondary: '#475569',
              success: '#22c55e',
              warning: '#eab308',
              danger: '#ef4444',
            }
          }
        }
      }
    </script>
    <style>
      @media print {
        @page {
          margin: 10mm;
          size: A4;
        }
        .no-print {
          display: none !important;
        }
        .print-only {
          display: block !important;
        }
        body {
          background-color: white;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        /* Ensure invoice content fits on printed page */
        .min-h-\[1100px\] {
          min-height: auto !important;
        }
        /* Keep footer together */
        .mt-auto {
          margin-top: 2rem !important;
          break-inside: avoid;
          page-break-inside: avoid;
        }
      }

      /* Hide number input spin buttons globally */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield; /* Firefox */
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "bcryptjs": "https://esm.sh/bcryptjs@^3.0.3",
    "vite": "https://esm.sh/vite@^7.3.1",
    "mysql2/": "https://esm.sh/mysql2@^3.17.1/",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>
  <body class="bg-gray-50 text-gray-900 h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
